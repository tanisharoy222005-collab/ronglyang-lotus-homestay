<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login | Ronglyang Lotus</title>

<link rel="stylesheet" href="../assets/css/admin.css">

</head>

<body>

<div class="login-container">

<div class="login-box">

<h1>Ronglyang Lotus Admin</h1>

<p id="modeText"></p>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Admin Email"
required
>

<input
type="password"
id="password"
placeholder="Password"
required
>

<button
type="submit"
id="submitBtn"
>
Continue
</button>

</form>

<p id="loginError"></p>

<button
type="button"
onclick="resetAdmin()"
class="reset-btn"
>
Reset Admin Account
</button>

</div>

</div>

<script src="../assets/js/admin.js"></script>

</body>

</html>
